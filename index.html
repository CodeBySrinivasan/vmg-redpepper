<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The VMG Groups | Redpepper Team Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap');
        
        :root {
            --vmg-red: #E11D48;
            --vmg-dark: #0F172A;
        }

        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background-color: #F8FAFC; 
        }

        .canvas-bg { 
            background-image: radial-gradient(#CBD5E1 1px, transparent 1px); 
            background-size: 30px 30px; 
        }

        .loader { 
            border-top-color: var(--vmg-red); 
            animation: spin 1s linear infinite; 
        }

        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        
        .image-grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); 
            gap: 24px; 
            width: 100%; 
            padding: 30px; 
        }

        .vmg-card {
            background: white;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            border: 1px solid #E2E8F0;
        }

        .vmg-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 20px 25px -5px rgb(0 0 0 / 0.1), 0 8px 10px -6px rgb(0 0 0 / 0.1);
            border-color: var(--vmg-red);
        }

        .glass-nav {
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid #E2E8F0;
        }

        .redpepper-badge {
            background: linear-gradient(135deg, #E11D48 0%, #9F1239 100%);
            color: white;
            padding: 4px 12px;
            border-radius: 6px;
            font-size: 10px;
            font-weight: 800;
            letter-spacing: 0.05em;
            text-transform: uppercase;
        }
    </style>
</head>
<body class="text-slate-900 overflow-hidden h-screen flex flex-col">

    <nav class="h-20 glass-nav flex items-center justify-between px-10 z-20">
        <div class="flex items-center gap-4">
            <div class="flex items-center gap-3">
                <div class="w-10 h-10 bg-slate-900 rounded-xl flex items-center justify-center shadow-lg">
                    <span class="text-white font-black text-xl">V</span>
                </div>
                <div>
                    <h1 class="font-extrabold tracking-tighter text-lg leading-none">THE VMG <span class="text-rose-600">GROUPS</span></h1>
                    <p class="text-[10px] text-slate-500 font-bold uppercase tracking-widest mt-1">Creative Production Hub</p>
                </div>
            </div>
            <div class="h-6 w-[1px] bg-slate-200 mx-2"></div>
            <span class="redpepper-badge">Redpepper Team Pro</span>
        </div>
        
        <div class="flex items-center gap-4">
            <button id="clearBtn" class="hidden text-xs font-bold text-slate-400 hover:text-rose-600 transition-colors uppercase tracking-widest">Clear Workspace</button>
            <button id="downloadAllBtn" class="hidden bg-slate-900 text-white px-6 py-2.5 rounded-full text-xs font-bold hover:bg-slate-800 transition shadow-lg active:scale-95">
                Download Batch (.zip)
            </button>
        </div>
    </nav>

    <div class="flex-1 flex overflow-hidden">
        <aside class="w-80 border-r border-slate-200 p-8 flex flex-col gap-8 bg-white z-10">
            <div>
                <label class="text-[11px] font-black text-slate-400 uppercase tracking-[0.2em] mb-5 block">Asset Ingestion</label>
                <label class="flex flex-col items-center justify-center w-full h-52 border-2 border-dashed border-slate-200 rounded-[2rem] hover:border-rose-500 cursor-pointer transition-all bg-slate-50/50 group overflow-hidden relative">
                    <div class="absolute inset-0 bg-rose-50 opacity-0 group-hover:opacity-100 transition-opacity"></div>
                    <div class="relative z-10 flex flex-col items-center">
                        <div class="w-12 h-12 rounded-full bg-white shadow-md flex items-center justify-center mb-3 group-hover:scale-110 transition-transform">
                            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" class="text-rose-600"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" x2="12" y1="3" y2="15"/></svg>
                        </div>
                        <span class="text-xs font-extrabold text-slate-600 uppercase tracking-tight">Drop Images Here</span>
                        <p class="text-[10px] text-slate-400 mt-1">PNG, JPG up to 10MB</p>
                    </div>
                    <input type="file" id="uploadInput" class="hidden" accept="image/*" multiple>
                </label>
            </div>

            <div class="mt-auto p-5 bg-slate-900 rounded-3xl text-white shadow-xl">
                <div class="flex items-center gap-2 mb-3">
                    <div class="w-2 h-2 rounded-full bg-green-400 animate-pulse"></div>
                    <p class="text-[10px] font-bold uppercase tracking-widest text-slate-400">Engine Status</p>
                </div>
                <p id="statusText" class="text-xs font-medium text-slate-200 leading-relaxed italic">System ready for professional isolation.</p>
            </div>
        </aside>

        <main class="flex-1 canvas-bg overflow-y-auto p-10">
            <div id="dropzone" class="relative min-h-full w-full max-w-6xl mx-auto bg-white/40 backdrop-blur-sm rounded-[3rem] border border-white shadow-2xl flex flex-col items-center justify-center overflow-hidden">
                
                <div id="loading" class="hidden flex-col items-center gap-6 my-10 animate-fade-in">
                    <div class="loader ease-linear rounded-full border-4 border-t-4 border-slate-100 h-16 w-16 shadow-inner"></div>
                    <div class="text-center">
                        <p class="text-xs font-black tracking-[0.3em] uppercase text-slate-900">Redpepper Engine</p>
                        <p class="text-[10px] text-slate-400 font-bold uppercase mt-1">Removing Backgrounds...</p>
                    </div>
                </div>

                <div id="placeholder" class="text-center space-y-4 py-20">
                    <div class="w-20 h-20 bg-slate-50 rounded-full flex items-center justify-center mx-auto mb-6">
                        <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="#CBD5E1" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>
                    </div>
                    <p class="text-slate-400 text-sm font-semibold tracking-tight uppercase">Workspace Empty</p>
                    <p class="text-slate-300 text-xs max-w-xs mx-auto">Upload images to begin the Redpepper Team Pro isolation process.</p>
                </div>

                <div id="imageGrid" class="image-grid hidden"></div>
            </div>
        </main>
    </div>

    <script>
        const uploadInput = document.getElementById('uploadInput');
        const imageGrid = document.getElementById('imageGrid');
        const loading = document.getElementById('loading');
        const placeholder = document.getElementById('placeholder');
        const statusText = document.getElementById('statusText');
        const clearBtn = document.getElementById('clearBtn');

        uploadInput.addEventListener('change', async (e) => {
            const files = Array.from(e.target.files);
            if (files.length === 0) return;

            placeholder.classList.add('hidden');
            loading.classList.remove('hidden');
            imageGrid.classList.remove('hidden');
            statusText.innerText = `Preparing batch of ${files.length} via Redpepper Pro...`;

            try {
                const startTime = performance.now();
                
                // STABLE SEQUENTIAL PROCESSING
                for (let i = 0; i < files.length; i++) {
                    const file = files[i];
                    statusText.innerText = `Processing asset ${i + 1} of ${files.length}: ${file.name}`;
                    
                    const formData = new FormData();
                    formData.append('file', file);

                    // RELATIVE PATH FOR DOCKER/HF COMPATIBILITY
                    const response = await fetch('/remove-bg', {
                        method: 'POST',
                        body: formData
                    });

                    if (!response.ok) throw new Error(`Error processing ${file.name}`);
                    
                    const blob = await response.blob();
                    const url = URL.createObjectURL(blob);
                    renderImage(url, file.name);
                }
                
                const endTime = performance.now();
                const duration = ((endTime - startTime) / 1000).toFixed(2);
                statusText.innerText = `Batch complete: ${files.length} assets isolated in ${duration}s`;
                clearBtn.classList.remove('hidden');

            } catch (err) {
                console.error(err);
                statusText.innerText = "Engine Error: Background isolation failed.";
            } finally {
                loading.classList.add('hidden');
            }
        });

        function renderImage(url, filename) {
            const container = document.createElement('div');
            container.className = "vmg-card rounded-3xl p-5 relative group";
            
            const img = document.createElement('img');
            img.src = url;
            img.className = "w-full h-52 object-contain drop-shadow-2xl z-10 relative";
            
            const label = document.createElement('p');
            label.className = "text-[10px] font-black uppercase mt-4 text-slate-400 tracking-wider truncate border-t pt-3";
            label.innerText = filename;

            const dl = document.createElement('a');
            dl.href = url;
            dl.download = `VMG-Isolated-${filename}`;
            dl.className = "absolute top-3 right-3 bg-rose-600 text-white p-2.5 rounded-xl opacity-0 group-hover:opacity-100 transition-all shadow-lg hover:bg-rose-700 z-20 transform translate-y-2 group-hover:translate-y-0";
            dl.innerHTML = '<svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" x2="12" y1="15" y2="3"/></svg>';

            container.appendChild(dl);
            container.appendChild(img);
            container.appendChild(label);
            imageGrid.appendChild(container);
        }

        clearBtn.onclick = () => {
            imageGrid.innerHTML = '';
            imageGrid.classList.add('hidden');
            placeholder.classList.remove('hidden');
            clearBtn.classList.add('hidden');
            statusText.innerText = "Workspace cleared. System ready.";
            uploadInput.value = '';
        };
    </script>
</body>
</html>
